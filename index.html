<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Benny's Calculator</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#1e293b;
    padding:40px;
    border-radius:15px;
    width:350px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
    margin-bottom:20px;
}

input{
    width:90%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:none;
    font-size:16px;
}

button{
    background:#3b82f6;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#2563eb;
}

.result{
    margin-top:20px;
    font-size:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>Calculadora</h1>

<input id="num1" placeholder="Número 1">
<input id="num2" placeholder="Número 2">

<br><br>

<button onclick="somar()">Somar</button>

<div class="result" id="resultado"></div>

</div>

<script>

function somar(){

let a = Number(document.getElementById("num1").value)
let b = Number(document.getElementById("num2").value)

document.getElementById("resultado").innerText = "Resultado: " + (a+b)

}

</script>

</body>
</html>
